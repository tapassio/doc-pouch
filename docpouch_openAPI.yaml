openapi: 3.0.1
info:
  title: DocPouch
  description: A light-weight, document-based database including user-management. DocPouch is meant for tests, development or internal applications, where security is not a major factor. The database is file and text based and therefore also not layed out for high performance. Instead the main focus of DocPouch is simplicity and a small footprint.
  version: 1.0.2
servers:
  - url: 'https://docpouch.example.com/api/v1'
    description: 'Main API server'
tags:
  - name: administration
    description: User management endpoints
  - name: documents
    description: Document management endpoints
  - name: data structures
    description: Data structure management endpoints
  - name: document types
    description: Document type management endpoints
paths:
  /users/login:
    post:
      summary: Authenticate a user
      tags:
        - administration
      requestBody:
        description: "User credentials for authentication"
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLogin"
      responses:
        200:
          description: "User has been successfully logged in and the new JSON web token is provided"
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: "JWT authentication token"
                required:
                  - token
        401:
          description: "Invalid credentials"
        404:
          description: "User not found"

  /users/list:
    get:
      summary: List user information
      description: Get all user information as admin or your user information as user
      tags:
        - administration
      security:
        - userAuth: [ ]
        - adminAuth: [ ]
      responses:
        200:
          description: List of all users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserDisplay"
        401:
          description: "User does not have access to full user list"

  /users/update/{userID}:
    patch:
      summary: Update user
      description: Update any user (as admin) or your own user applying the provided attributes
      tags:
        - administration
      security:
        - userAuth: [ ]
        - adminAuth: [ ]
      parameters:
        - in: path
          description: "Unique user ID"
          name: userID
          required: true
          schema:
            type: string
      requestBody:
        description: "Data object containing only the attributes to be updated"
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        200:
          description: "User has been successfully updated"
        401:
          description: "Not authorized to update this user"
        404:
          description: "User not found"

  /users/create:
    post:
      summary: Create a new user
      tags:
        - administration
      security:
        - adminAuth: [ ]
      requestBody:
        description: "JSON body with all information to create a new user"
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreation"
      responses:
        200:
          description: "User account has been successfully created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDisplay"
        401:
          description: "User is unauthorized to create new users"

  /users/remove/{userID}:
    delete:
      summary: Remove a user and all its documents
      tags:
        - administration
      security:
        - adminAuth: [ ]
      parameters:
        - in: path
          description: "Unique user ID"
          name: userID
          required: true
          schema:
            type: string
      responses:
        200:
          description: "User successfully deleted"
        401:
          description: "Not authorized to delete this user"
        404:
          description: "User not found"

  /docs/create:
    post:
      summary: Create a new document
      tags:
        - documents
      security:
        - userAuth: [ ]
        - adminAuth: [ ]
      requestBody:
        description: "JSON body with all the information to create a new document"
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewDocument"
      responses:
        200:
          description: "Document has been successfully created. The new id of the document can be read from the response."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        401:
          description: "User is unauthorized to create new documents"

  /docs/list:
    get:
      summary: List documents
      description: "List all documents owned by the user or shared with the user's group or department, but omit their content. For administrators, all documents are listed."
      tags:
        - documents
      security:
        - userAuth: [ ]
        - adminAuth: [ ]
      responses:
        200:
          description: "Array of documents with the content attribute omitted"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
        401:
          description: "Not authorized to list documents"

  /docs/fetch:
    post:
      summary: "Get a document based on a query object."
      description: "Users can fetch their own documents and documents shared with their group or department. Administrators can fetch any document on the server. Omit keys not used in the query."
      tags:
        - documents
      security:
        - userAuth: [ ]
        - adminAuth: [ ]
      requestBody:
        required: true
        description: "An object describing the query to fetch the documents."
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/DocumentQuery"
      responses:
        200:
          description: "Documents matching the query criteria"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        401:
          description: "User does not have access to this document"
        404:
          description: "Document with this ID could not be found"

  /docs/update/{documentID}:
    patch:
      summary: Update a document by applying the provided attributes
      description: "Users can update their own documents fully. Users with shared access (via group or department) can only update the content field. Only document owners can change sharing settings."
      tags:
        - documents
      security:
        - userAuth: [ ]
        - adminAuth: [ ]
      parameters:
        - in: path
          description: "Unique document ID"
          name: documentID
          required: true
          schema:
            type: string
      requestBody:
        description: "Data object containing only the attributes to be updated"
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Document"
      responses:
        200:
          description: "Document has been successfully updated"
        401:
          description: "Not authorized to update this document"
        404:
          description: "Document not found"

  /docs/remove/{documentID}:
    delete:
      summary: Remove a document
      tags:
        - documents
      security:
        - userAuth: [ ]
        - adminAuth: [ ]
      parameters:
        - in: path
          description: "Unique document ID"
          name: documentID
          required: true
          schema:
            type: string
      responses:
        200:
          description: "Document successfully deleted"
        401:
          description: "Not authorized to delete this document"
        404:
          description: "Document not found"

  /structures/create:
    post:
      summary: Create a new data structure
      tags:
        - data structures
      security:
        - adminAuth: [ ]
      requestBody:
        description: "JSON body with all the information to create a new data structure"
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataStructureCreation"
      responses:
        200:
          description: "Structure has been successfully created. The new id of the structure can be read from the response."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataStructure"
        401:
          description: "User is unauthorized to create new data structures"

  /structures/list:
    get:
      summary: Get all data structures
      description: "Fetch all data structures"
      tags:
        - data structures
      security:
        - userAuth: [ ]
        - adminAuth: [ ]
      responses:
        200:
          description: "Array of data structures"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DataStructure"
        401:
          description: "Not authorized to list data structures"

  /structures/update/{structureID}:
    patch:
      summary: Update the selected data structure applying the provided attributes
      tags:
        - data structures
      security:
        - adminAuth: [ ]
      parameters:
        - in: path
          description: "Unique structure ID"
          name: structureID
          required: true
          schema:
            type: string
      requestBody:
        description: "Data object containing only the attributes to be updated"
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataStructure"
      responses:
        200:
          description: "Structure has been successfully updated"
        401:
          description: "Not authorized to update this structure"
        404:
          description: "Structure not found"

  /structures/remove/{structureID}:
    delete:
      summary: Remove a data structure
      tags:
        - data structures
      security:
        - adminAuth: [ ]
      parameters:
        - in: path
          description: "Unique structure ID"
          name: structureID
          required: true
          schema:
            type: string
      responses:
        200:
          description: "Structure successfully deleted"
        401:
          description: "Not authorized to delete this structure"
        404:
          description: "Structure not found"

  /types/list:
    get:
      summary: List all document types
      description: Get all document types
      tags:
        - document types
      security:
        - userAuth: [ ]
        - adminAuth: [ ]
      responses:
        200:
          description: List of all document types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentTypeEdit"
        401:
          description: "Not authorized"

  /types/write:
    post:
      summary: Add or overwrite a document type
      tags:
        - document types
        - administration
      security:
        - adminAuth: [ ]
      requestBody:
        description: "Data object containing the new data type. If it contains an _id, the entry will be overwritten. Otherwise, a new document type will be created, provided the type/subtype combination does not exist yet."
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentTypeEdit"
      responses:
        200:
          description: "Document type successfully written"
        401:
          description: "Not authorized to write document types"

  /types/remove/{documentTypeID}:
    delete:
      summary: Remove a document type
      description: Caution, removing a document type could result in existing documents referring to a non-existant document type"
      tags:
        - data types
        - administration
      security:
        - adminAuth: [ ]
      parameters:
        - in: path
          description: "Unique document type ID"
          name: documentTypeID
          required: true
          schema:
            type: string
      responses:
        200:
          description: "Document type successfully deleted"
        401:
          description: "Not authorized to delete document types"
        404:
          description: "Document type not found"

components:
  schemas:
    Document:
      type: object
      description: "Data element describing a custom document"
      properties:
        _id:
          type: string
          description: "Unique ID of document. Only used for queries and deletions"
          example: "3ufDC0Rh5g7arSC9"
        type:
          type: integer
          description: "Type of document - can be used by user for document organization"
          example: 17
        subType:
          type: integer
          description: "Sub-type of document - can be used by user for document organization"
          example: 11
        title:
          type: string
          description: "The title of the document"
          example: "Mission Statement"
        content:
          type: string
          description: "The content of the document in a string. If you want to store binary data it needs to be Base64 encoded."
          example: "{\"msg\": \"We strive for a world that ... \"}"
        shareWithGroup:
          type: boolean
          description: "If true, the document is shared with all users in the owner's group"
          example: false
        shareWithDepartment:
          type: boolean
          description: "If true, the document is shared with all users in the owner's department"
          example: false
      required:
        - _id
        - title
        - type
        - subType
        - content

    DocumentQuery:
      type: object
      description: "Query element describing the aspects of a document query"
      properties:
        _id:
          type: string
          description: "Unique ID of document. Only used for queries and deletions"
          example: "3ufDC0Rh5g7arSC9"
        type:
          type: integer
          description: "Type of document - can be used by user for document organization"
          example: 17
        subType:
          type: integer
          description: "Sub-type of document - can be used by user for document organization"
          example: 11
        title:
          type: string
          description: "The title of the document"
          example: "Mission Statement"
        description:
          type: string
          description: "The description of the document"
          example: "A statement describing the corporate mission or how to achieve the corporate vision"
        shareWithGroup:
          type: boolean
          description: "If true, the document is shared with all users in the owner's group"
          example: false
        shareWithDepartment:
          type: boolean
          description: "If true, the document is shared with all users in the owner's department"
          example: false

    NewDocument:
      type: object
      description: "Data element for creating a new document"
      properties:
        type:
          type: integer
          description: "Type of document - can be used by user for document organization"
          example: 17
        subtype:
          type: integer
          description: "Sub-type of document - can be used by user for document organization"
          example: 11
        title:
          type: string
          description: "The title of the document"
          example: "Mission Statement"
        content:
          type: string
          description: "The content of the document in a string. If you want to store binary data it needs to be Base64 encoded."
          example: "{\"msg\": \"We strive for a world that ... \"}"
        shareWithGroup:
          type: boolean
          description: "If true, the document is shared with all users in the owner's group"
          example: false
        shareWithDepartment:
          type: boolean
          description: "If true, the document is shared with all users in the owner's department"
          example: false
      required:
        - title
        - type
        - subtype
        - content
        - shareWithDepartment
        - shareWithGroup

    UserDisplay:
      type: object
      description: "Data element describing the user-facing side of a user account"
      properties:
        _id:
          type: integer
          description: "A unique not-changable user ID"
          example: 2
        name:
          type: string
          description: "User names can be changed at any time and are not necessarily unique. Users are uniquely identified based on their id."
          example: "Darth Vader"
        email:
          type: string
          description: "User email address"
          example: "darth@gmail.com"
        department:
          type: string
          description: "The department the user is part of"
          example: "Administration"
        group:
          type: string
          description: "The group the user is part of"
          example: "The Magentas"
      required:
        - _id
        - name
        - department
        - group

    UserCreation:
      type: object
      description: "Data element needed to trigger user creation"
      properties:
        name:
          type: string
          example: "Darth Vader"
          description: "User names can be changed at any time and are not necessarily unique. Users are uniquely identified based on their id."
        password:
          type: string
          example: "darths-secret"
          description: "Password is used as main authentication element"
        email:
          type: string
          example: "darth@gmail.com"
          description: "User email address"
        department:
          type: string
          description: "The department the user is part of"
          example: "Administration"
        group:
          type: string
          description: "The group the user is part of"
          example: "The Magentas"
        isAdmin:
          type: boolean
          example: false
          description: "Flag indicating if the user has administrator privileges"
      required:
        - name
        - password
        - isAdmin
        - department
        - group

    UserUpdate:
      type: object
      description: "Data element needed to trigger a user update"
      properties:
        name:
          type: string
          example: "Darth Vader"
          description: "User names can be changed at any time and are not necessarily unique. Users are uniquely identified based on their id."
        password:
          type: string
          example: "darths-secret"
          description: "Password is used as main authentication element"
        email:
          type: string
          example: "darth@gmail.com"
          description: "User email address"
        isAdmin:
          type: boolean
          example: false
          description: "Flag indicating if the user has administrator privileges"
        department:
          type: string
          description: "The department the user is part of"
          example: "Administration"
        group:
          type: string
          description: "The group the user is part of"
          example: "The Magentas"

    UserLogin:
      type: object
      description: "Data element needed for user authentication"
      properties:
        name:
          type: string
          example: "Darth Vader"
          description: "User name for authentication"
        password:
          type: string
          example: "darths-secret"
          description: "Password is used as main authentication element"
      required:
        - name
        - password

    DataStructure:
      type: object
      description: "Data element describing a data structure"
      properties:
        _id:
          type: integer
          description: "Unique ID of data structure, is used as type for documents"
          example: 18
        title:
          type: string
          description: "The title of the structure"
          example: "Data resulting from Vision-Mission-Value-Canvas"
        fields:
          type: array
          description: "Array of fields defining the structure"
          items:
            $ref: "#/components/schemas/DataField"
      required:
        - title
        - fields
        - _id

    DataStructureCreation:
      type: object
      description: "Data element describing a data structure"
      properties:
        title:
          type: string
          description: "The title of the structure"
          example: "Data resulting from Vision-Mission-Value-Canvas"
        fields:
          type: array
          description: "Array of fields defining the structure"
          items:
            $ref: "#/components/schemas/DataField"
      required:
        - title
        - fields

    DataField:
      type: object
      description: "Structure element describing one field in a data structure"
      properties:
        name:
          type: string
          description: "Field name"
          example: "Mission value statement"
        type:
          type: string
          description: "Determines the type of the data field"
          enum: ["number", "string", "boolean", "array", "structure"]
          example: "boolean"
        items:
          type: string
          description: "Type of array items or reference to other existing data structures"
          example: "tt5vo04DN3jm8Bqe"
      required:
        - name
        - type

    DocumentTypeEdit:
      type: object
      description: "Structure describing a document type"
      properties:
        _id:
          type: string
          description: "Document type ID"
          example: "yejS2mp4HmHQ8pDl"
        name:
          type: string
          description: "Document type name"
          example: "HR Wages"
        description:
          type: string
          description: "Document type description"
          example: "HR Wage information Document listing wages per personnel ID"
        type:
          type: number
          description: "The index for this document type"
          example: 14
        subType:
          type: number
          description: "The index for this document subtype"
          example: 2
        defaultStructureID:
          type: string
          description: "ID of the document structure this data type is supposed to use"
          example: "6O7LeciisTY20PCQ"
      required:
        - name
        - type
        - subType



  securitySchemes:
    userAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    adminAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
